<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pump.fun 热点监控 - 专业版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .header h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            height: 350px;
        }
        .search-box {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e7ff;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .search-box button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .search-box button:hover {
            transform: scale(1.05);
        }
        .token-table {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 10px;
            font-weight: 500;
        }
        td {
            padding: 15px 10px;
            border-bottom: 1px solid #e0e7ff;
        }
        .token-name {
            font-weight: 600;
            color: #667eea;
        }
        .contract-address {
            background: #f0f4ff;
            color: #667eea;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            display: inline-block;
            transition: all 0.2s;
            border: 1px solid #e0e7ff;
        }
        .contract-address:hover {
            background: #667eea;
            color: white;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        .update-time {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 Pump.fun 热点监控 · 专业版</h1>
            <p>实时追踪最新代币，一键复制合约地址</p>
            <div class="update-time" id="updateTime">最后更新: 加载中...</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">今日热点数量</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最高24h交易</div>
                <div class="stat-value" id="maxTx">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最高流动性</div>
                <div class="stat-value" id="maxLiq">$0</div>
            </div>
        </div>

        <div class="chart-container" id="txChart"></div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索代币名称或符号...">
            <button onclick="filterTokens()">🔍 搜索</button>
        </div>

        <div class="token-table">
            <h2 style="margin-bottom: 20px; color: #333;">📋 最新热点列表</h2>
            <table>
                <thead>
                    <tr>
                        <th>代币</th>
                        <th>发布时间</th>
                        <th>价格</th>
                        <th>流动性</th>
                        <th>24h交易</th>
                        <th>合约地址</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align: center; padding: 50px;">加载数据中...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            ⚡ 点击合约地址即可复制 · 数据每60秒自动刷新
        </div>
    </div>

    <script>
        let allTokens = [];

        function copyContract(address) {
            navigator.clipboard.writeText(address).then(() => {
                alert('✅ 合约地址已复制');
            });
        }

        function formatNumber(num) {
            return num ? num.toString().replace(/\\B(?=(\\d{3})+(?!\\d))/g, ",") : '0';
        }

        function filterTokens() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');
            
            rows.forEach(row => {
                if (row.cells && row.cells.length > 1) {
                    const text = row.innerText.toLowerCase();
                    row.style.display = text.includes(keyword) ? '' : 'none';
                }
            });
        }

        async function loadData() {
            try {
                const response = await fetch('hot_tokens.json?' + Date.now());
                allTokens = await response.json();
                
                if (!allTokens || allTokens.length === 0) {
                    document.getElementById('tableBody').innerHTML = 
                        '<tr><td colspan="6" style="text-align: center; padding: 50px;">暂无数据</td></tr>';
                    return;
                }

                // 更新统计
                document.getElementById('totalCount').innerText = allTokens.length;
                
                const maxTx = Math.max(...allTokens.map(d => d.tx_count || 0));
                document.getElementById('maxTx').innerText = maxTx;
                
                const maxLiq = Math.max(...allTokens.map(d => d.liquidity || 0));
                document.getElementById('maxLiq').innerText = '$' + formatNumber(maxLiq);

                document.getElementById('updateTime').innerText = 
                    '最后更新: ' + new Date().toLocaleString('zh-CN');

                // 渲染表格
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                allTokens.slice(0, 15).forEach(token => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><span class="token-name">${token.name || '未知'} (${token.symbol || '未知'})</span></td>
                        <td>${token.time || '未知'}</td>
                        <td style="color: #27ae60; font-weight: 500;">$${token.price || 'N/A'}</td>
                        <td>$${token.liquidity ? formatNumber(token.liquidity) : '0'}</td>
                        <td>${token.tx_count || 0} 笔</td>
                        <td><span class="contract-address" onclick="copyContract('${token.contract}')">${token.contract ? token.contract.slice(0,10) + '...' + token.contract.slice(-6) : '无'}</span></td>
                    `;
                    tbody.appendChild(row);
                });

                // 渲染图表
                const chartDom = document.getElementById('txChart');
                const myChart = echarts.init(chartDom);
                
                const option = {
                    title: { 
                        text: '24h 交易笔数 TOP 10', 
                        left: 'center',
                        textStyle: { fontSize: 16, color: '#333' }
                    },
                    tooltip: { trigger: 'axis' },
                    grid: { left: '10%', right: '5%', bottom: '15%', top: '20%' },
                    xAxis: {
                        type: 'category',
                        data: allTokens.slice(0,10).map(d => d.symbol || '未知'),
                        axisLabel: { rotate: 30 }
                    },
                    yAxis: { type: 'value', name: '交易笔数' },
                    series: [{
                        name: '交易数',
                        type: 'bar',
                        data: allTokens.slice(0,10).map(d => d.tx_count || 0),
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#667eea' },
                                { offset: 1, color: '#764ba2' }
                            ]),
                            borderRadius: [6,6,0,0]
                        },
                        barWidth: 25
                    }]
                };
                
                myChart.setOption(option);

            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="6" style="text-align: center; padding: 50px;">加载失败，请刷新重试</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadData);
        setInterval(loadData, 60000);
    </script>
</body>
</html>
