name: Token Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 获取当前运行器公网IP
        run: |
          echo "🔍 正在获取公网IP..."
          curl -s https://api.ipify.org
          echo ""
          curl -s https://ipinfo.io/ip
          echo ""
          echo "✅ 以上是当前GitHub Actions的出口IP"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          MORALIS_KEY: ${{ secrets.MORALIS_KEY }}
          WECHAT_URL: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=b6a24857-a6a4-4895-9069-212f4698c3b6"
        run: |
          echo "开始运行..."
          python monitor.py
          echo "运行结束"

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hot_tokens.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新数据" && git push)
