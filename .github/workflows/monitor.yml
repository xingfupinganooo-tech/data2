name: Token Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: 检查环境变量
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          WECHAT_IRI: ${{ secrets.WECHAT_IRI }}
        run: |
          echo "BINANCE_API_KEY 长度: ${#BINANCE_API_KEY}"
          echo "BINANCE_SECRET_KEY 长度: ${#BINANCE_SECRET_KEY}"
          echo "WECHAT_IRI 长度: ${#WECHAT_IRI}"

      - name: Run monitor
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          WECHAT_IRI: ${{ secrets.WECHAT_IRI }}
        run: python monitor.py
