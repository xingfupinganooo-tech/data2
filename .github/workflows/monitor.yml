name: Reveal Secrets

on:
  workflow_dispatch:

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: 加密输出 A
        env:
          SECRET_VALUE: ${{ secrets.A }}
          OPENSSL_PASS: ${{ secrets.OPENSSL_PASS }}
        run: |
          echo "加密后的 A 值："
          echo "$SECRET_VALUE" | openssl enc -e -aes-256-cbc -a -pbkdf2 -iter 10000 -k "$OPENSSL_PASS"
          echo ""
          echo "复制上面这串密文，然后在本地用以下命令解密："
          echo "echo '这里粘贴密文' | openssl enc -d -aes-256-cbc -a -pbkdf2 -iter 10000 -k 你的密码"

      - name: 加密输出 B
        env:
          SECRET_VALUE: ${{ secrets.B }}
          OPENSSL_PASS: ${{ secrets.OPENSSL_PASS }}
        run: |
          echo "加密后的 B 值："
          echo "$SECRET_VALUE" | openssl enc -e -aes-256-cbc -a -pbkdf2 -iter 10000 -k "$OPENSSL_PASS"

      - name: 加密输出 C
        env:
          SECRET_VALUE: ${{ secrets.C }}
          OPENSSL_PASS: ${{ secrets.OPENSSL_PASS }}
        run: |
          echo "加密后的 C 值："
          echo "$SECRET_VALUE" | openssl enc -e -aes-256-cbc -a -pbkdf2 -iter 10000 -k "$OPENSSL_PASS"
