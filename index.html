<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>优质代币监控</title>
    <style>
        body { font-family: sans-serif; background: #0e0e0e; color: #ddd; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #f90; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; background: #222; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        img { width: 24px; height: 24px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
        .category { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .🔥早期 { background: #ff4500; color: white; }
        .🚀高潮 { background: #ff1493; color: white; }
        .📈中期 { background: #1e90ff; color: white; }
        .📉低潮 { background: #808080; color: white; }
        .💎优质 { background: gold; color: black; }
        .⭐潜力 { background: #32cd32; color: black; }
        .contract { font-family: monospace; background: #222; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 优质代币监控</h1>
        <p>实时筛选结果 | 更新时间: <span id="update"></span></p>
        <table id="token-table">
            <thead>
                <tr>
                    <th>代币</th>
                    <th>分类</th>
                    <th>价格</th>
                    <th>24h交易数</th>
                    <th>流动性</th>
                    <th>合约地址</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="6">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function copyContract(addr) {
            navigator.clipboard.writeText(addr).then(() => alert('✅ 合约已复制'));
        }

        async function loadData() {
            try {
                const res = await fetch('hot_tokens.json?' + Date.now());
                const data = await res.json();
                const tbody = document.getElementById('table-body');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">暂无数据</td></tr>';
                    return;
                }
                let html = '';
                data.reverse().forEach(t => {  // 最新的在前面
                    const imgHtml = t.image ? `<img src="${t.image}" onerror="this.style.display='none'">` : '';
                    html += `<tr>
                        <td>${imgHtml} ${t.name} (${t.symbol})</td>
                        <td><span class="category ${t.category}">${t.category}</span><br><small>${t.reason || ''}</small></td>
                        <td>$${t.price.toFixed(8)}</td>
                        <td>${t.tx}</td>
                        <td>$${t.liq.toFixed(0)}</td>
                        <td><span class="contract" onclick="copyContract('${t.contract}')">${t.contract.slice(0,6)}...${t.contract.slice(-4)}</span></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
                document.getElementById('update').innerText = new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('table-body').innerHTML = '<tr><td colspan="6">加载失败</td></tr>';
            }
        }

        loadData();
        setInterval(loadData, 30000);  // 30秒刷新一次
    </script>
</body>
</html>
