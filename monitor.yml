name: Token Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          MORALIS_KEY: ${{ secrets.MORALIS_KEY }}
          WECHAT_URL: ${{ secrets.WECHAT_URL }}
        run: |
          echo "MORALIS_KEY 长度: ${#MORALIS_KEY}"
          echo "WECHAT_URL 长度: ${#WECHAT_URL}"
          python monitor.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hot_tokens.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新代币数据" && git push)
